# docker-compose.yml — one-command local dev environment.
#   docker compose up --build
#
# Brings up the API + Postgres (pgvector image, ready for Week 5) + Redis.
# This mirrors the roadmap's compose file (page 19), scoped to Week 2.

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Inside the compose network, services reach each other by service name,
      # so the host is "db" / "redis", not localhost.
      DATABASE_URL: postgresql://devuser:devpass@db:5432/capstone_dev
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      LOG_LEVEL: info
    depends_on:
      # Wait for healthchecks, not just "container started" — otherwise the API
      # races Postgres and crashes on the first connection attempt.
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16   # superset of plain postgres:16; pgvector ready for Week 5
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: capstone_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Anything in this dir is run once on first init — our schema migration.
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d capstone_dev"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── observability stack ──────────────────────────────────────────────────
  # Optional: only starts with `docker compose --profile observability up`.
  # Default `docker compose up` stays lean (just api+db+redis). Profiles let
  # you opt into heavier services without a second compose file.
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.local.yml:/etc/prometheus/alerts.local.yml:ro

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      # Dev-only: skip the login screen so you land straight on the dashboard.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      # Provisioning: datasource + dashboard provider configs.
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      # Mount the dashboard JSON where the provider expects to find it.
      - ./observability/grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
