# Secret holds sensitive values (the DB DSN with its password). In real life
# you'd NOT commit this — you'd use Sealed Secrets, External Secrets Operator,
# or Vault (roadmap Project 4). Committed here only as a template; stringData
# lets you write plain text and k8s base64-encodes it for you.
apiVersion: v1
kind: Secret
metadata:
  name: documents-secret
  namespace: documents
type: Opaque
stringData:
  DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/capstone_dev"
